name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build tests
        run: |
          make test_registers
          make test_parser
          make test_symbols
          make test_assembler

      - name: Run tests
        run: |
          ./test_registers
          ./test_parser
          ./test_symbols
          ./test_assembler

